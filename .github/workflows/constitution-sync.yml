name: Constitution sync

# Keeps this implementation honest about which version of the Civic Access
# Protocol constitution it was verified against. It re-checks the upstream
# CONSTITUTION.md against the pin in constitution.lock and, if it has changed,
# opens an issue asking a human to re-review COMPLIANCE.md and re-pin.
#
# the-open-state is a PUBLIC repo, so no PAT or secret setup is required. The
# job passes the built-in GITHUB_TOKEN (github.token) only for GitHub API
# rate-limit headroom; the check also works unauthenticated.

on:
  schedule:
    - cron: "0 13 * * 1" # Mondays 13:00 UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - constitution.lock
      - COMPLIANCE.md
      - scripts/check-constitution.mjs
      - .github/workflows/constitution-sync.yml

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - id: check
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/check-constitution.mjs

      - name: Open or update drift issue
        if: steps.check.outputs.status == 'drift'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.existsSync('constitution-drift.md')
              ? fs.readFileSync('constitution-drift.md', 'utf8')
              : 'Constitution drift detected; see the workflow run.';
            const title = 'Constitution drift: re-verify Civic Access Protocol compliance';
            const { owner, repo } = context.repo;
            const open = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'constitution-drift',
            });
            if (open.data.length) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: open.data[0].number, body,
              });
            } else {
              await github.rest.issues.create({
                owner, repo, title, body, labels: ['constitution-drift'],
              });
            }

      - name: Reflect status in the run
        if: steps.check.outputs.status != 'sync'
        run: |
          echo "Constitution check status: ${{ steps.check.outputs.status }}"
          echo "See the step summary above for details."
          exit 1

name: Release MCPB bundle

# Builds the one-click Claude Desktop bundle (alberta-assisted-living.mcpb) and
# publishes it as a downloadable asset on a GitHub Release. The .mcpb is a build
# artifact (gitignored), so it is produced here in CI rather than committed to
# the tree.
#
# Trigger either way:
#   - manually via "Run workflow" (workflow_dispatch), choosing the tag, or
#   - by pushing a version tag, e.g. `git tag v0.1.0 && git push origin v0.1.0`.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create/publish (e.g. v0.1.0)"
        required: true
        default: "v0.1.0"
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the release and upload the .mcpb asset

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build bundle staging dir (dist/)
        run: npm run build

      - name: Pack the .mcpb bundle
        run: |
          npm install -g @anthropic-ai/mcpb
          mcpb pack dist alberta-assisted-living.mcpb
          ls -l alberta-assisted-living.mcpb

      - name: Publish release with the .mcpb asset
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          cat > release-notes.md <<'EOF'
          One-click Claude Desktop install bundle for the **Alberta Assisted Living** MCP server — a read-only Civic Access Protocol server over Alberta's Assisted Living Navigator.

          ### Install
          Download `alberta-assisted-living.mcpb` below and **double-click** it, or in Claude Desktop open **Settings -> Extensions -> Install from file**. No prerequisites — it runs on Claude Desktop's bundled Node.

          ### Tools
          - `search_facilities_by_name`
          - `find_facilities_near`
          - `get_facility_details`
          - `explain_care_options`
          EOF

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; uploading/overwriting the asset."
            gh release upload "$TAG" alberta-assisted-living.mcpb --clobber
          else
            echo "Creating release $TAG at $GITHUB_SHA."
            gh release create "$TAG" alberta-assisted-living.mcpb \
              --target "$GITHUB_SHA" \
              --title "Alberta Assisted Living $TAG" \
              --notes-file release-notes.md
          fi
